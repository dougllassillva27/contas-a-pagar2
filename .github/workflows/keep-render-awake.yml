name: Keep Render Awake

on:
  schedule:
    # 08:01 até 23:49 no horário de Brasília (UTC-3)
    # UTC equivalente:
    # 11:01 até 23:49 UTC
    - cron: "1,13,25,37,49 11-23 * * *"
    # 00:01 até 02:49 UTC = 21:01 até 23:49 BRT do dia anterior? Não.
    # Aqui cobre 21:01 até 23:49 UTC? Não.
    # Como o horário local vai até 23:59 BRT e BRT = UTC-3,
    # precisamos também cobrir 00:01 até 02:49 UTC, que corresponde
    # a 21:01 até 23:49 BRT do mesmo "dia local".
    - cron: "1,13,25,37,49 0-2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Executar ping no Render
        env:
          KEEP_ALIVE_URL: https://contas-a-pagar-nsti.onrender.com/health
        run: node scripts/ping-render.mjs
