name: Keep Render Awake

on:
  schedule:
    # Horário de Brasília (UTC-3)
    # 08:01 até 20:49 BRT = 11:01 até 23:49 UTC
    - cron: '1,13,25,37,49 11-23 * * *'

    # 21:01 até 23:49 BRT = 00:01 até 02:49 UTC
    - cron: '1,13,25,37,49 0-2 * * *'
  workflow_dispatch:

concurrency:
  group: keep-render-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar URL configurada
        env:
          KEEP_ALIVE_URL: ${{ vars.KEEP_ALIVE_URL }}
        run: |
          if [ -z "$KEEP_ALIVE_URL" ]; then
            echo "❌ A variável KEEP_ALIVE_URL não está definida em Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi
          echo "✅ KEEP_ALIVE_URL configurada com sucesso."

      - name: Executar ping no Render
        env:
          KEEP_ALIVE_URL: ${{ vars.KEEP_ALIVE_URL }}
          MAX_TENTATIVAS: '3'
          TIMEOUT_MS: '15000'
          ESPERA_ENTRE_TENTATIVAS_MS: '4000'
        run: node scripts/ping-render.mjs
