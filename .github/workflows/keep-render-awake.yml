name: Keep Render Awake

on:
  schedule:
    # Roda a cada 5 minutos.
    # O script decide se deve ou não executar o ping.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-render-awake
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar URL configurada
        env:
          KEEP_ALIVE_URL: ${{ vars.KEEP_ALIVE_URL }}
        run: |
          if [ -z "$KEEP_ALIVE_URL" ]; then
            echo "❌ A variável KEEP_ALIVE_URL não está definida em Settings > Secrets and variables > Actions > Variables"
            exit 1
          fi
          echo "✅ KEEP_ALIVE_URL configurada com sucesso."

      - name: Executar keep alive inteligente
        env:
          KEEP_ALIVE_URL: ${{ vars.KEEP_ALIVE_URL }}
          MAX_TENTATIVAS: '3'
          TIMEOUT_MS: '15000'
          ESPERA_ENTRE_TENTATIVAS_MS: '4000'
          TZ_APP: 'America/Sao_Paulo'
          JANELA_HORA_INICIO: '8'
          JANELA_HORA_FIM: '23'
          MINUTOS_PERMITIDOS: '1,13,25,37,49'
          TOLERANCIA_MINUTOS_ATRASO: '1'
        run: node scripts/ping-render.mjs
