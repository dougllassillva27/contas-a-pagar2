<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Luz - Simplificada</title>
    <!-- Ignora requisição de favicon para evitar Erro 404 no console -->
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Controle de Energia</h1>
        <p>Acompanhe seu consumo mensal de forma simplificada</p>
      </header>

      <main>
        <section class="card form-section">
          <h2>Nova Medição</h2>
          <form id="energyForm">
            <div class="form-group">
              <label for="mesReferencia">Mês de Referência</label>
              <input type="text" id="mesReferencia" placeholder="Ex: Abril 2026" required />
            </div>

            <div class="form-group">
              <label for="leituraAnterior">Leitura Anterior (kWh)</label>
              <input
                type="number"
                id="leituraAnterior"
                step="0.01"
                placeholder="O que estava no relógio antes"
                required
              />
            </div>

            <div class="form-group">
              <label for="leituraAtual">Leitura Atual (kWh)</label>
              <input type="number" id="leituraAtual" step="0.01" placeholder="O que está no relógio hoje" required />
            </div>

            <button type="submit" class="btn-primary">Calcular e Salvar</button>
          </form>
        </section>

        <section class="card result-section" id="resultCard" style="display: none">
          <h2>Resumo da Estimativa</h2>
          <div class="result-grid">
            <div class="result-item">
              <span>Consumo:</span>
              <strong id="displayConsumo">0 kWh</strong>
            </div>
            <div class="result-item highlight">
              <span>Valor Estimado:</span>
              <strong id="displayValor">R$ 0,00</strong>
            </div>
          </div>
        </section>

        <section class="card history-section">
          <h2>Histórico de Registros</h2>
          <div class="table-responsive">
            <table id="historyTable">
              <thead>
                <tr>
                  <th>Mês</th>
                  <th>Leitura Anterior</th>
                  <th>Leitura Atual</th>
                  <th>Consumo</th>
                  <th>Valor</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="historyBody">
                <!-- Populated by JavaScript -->
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
